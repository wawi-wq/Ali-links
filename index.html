<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة روابطي</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* خلفية متدرجة فخمة */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 { font-size: 24px; margin-bottom: 30px; }

        .link-btn {
            display: block;
            background: white;
            color: #764ba2;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 50px; /* أزرار دائرية مثل لينك تري */
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .link-btn:hover {
            transform: translateY(-3px); /* حركة القفز عند التأشير */
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            background: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/120" alt="صورة الشخصية" class="profile-img">
        
        <h1>علي حسين 🚀</h1>

        <a href="https://instagram.com/not_wawi" class="link-btn">إنستغرام</a>
        <a href="https://t.me/Ali_Alyagoob" class="link-btn">تليجرام</a>
        <a href="https://www.youtube.com/@Ali.Alyagoob" class="link-btn">قناتي على يوتيوب</a>
        <a href="https://wa.me/07704267198" class="link-btn">راسلني على واتساب</a>
    </div>

</body>
</html>
