<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI | ELITE PRESENCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0061ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --drip-color: #660000;
            --bg-dark: #020205;
        }

        /* تم استعادة الماوس الطبيعي */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }

        body {
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; color: white; overflow: hidden;
            perspective: 2000px;
            position: relative;
        }

        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            z-index: 99; pointer-events: none; opacity: 0.6;
        }

        #dataRain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        .container {
            width: 92%; max-width: 380px;
            padding: 25px 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            animation: emerge 1s ease-out;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            position: relative; /* مهم لقطرات الدم */
        }

        .container:hover { transform: rotateY(5deg) rotateX(2deg); }

        @keyframes emerge { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .profile-wrapper {
            position: relative;
            width: 110px; height: 110px; 
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
        }

        .profile-img-cyber {
            width: 100px; height: 100px;
            background: url('me.png') center/contain no-repeat; 
            z-index: 2; filter: drop-shadow(0 0 10px var(--primary));
            transition: opacity 0.4s;
        }

        .profile-img-skull {
            width: 85px; height: 85px;
            background: url('skull.png') center/contain no-repeat; 
            position: absolute; z-index: 3; opacity: 0;
            filter: drop-shadow(0 0 15px #ff0000);
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-wrapper::after {
            content: ''; position: absolute;
            width: 115px; height: 115px;
            border-radius: 50%; border: 2px solid var(--primary);
            border-top-color: transparent; border-bottom-color: transparent;
            animation: spin 3s linear infinite;
            transition: border-color 0.3s;
        }

        /* تأثير تنقيط الدماء */
        .blood-drip {
            position: absolute;
            top: 70%; /* يبدأ من منطقة الفم/الأسفل في الجمجمة */
            width: 3px;
            background: #ff0000;
            border-radius: 0 0 5px 5px;
            z-index: 4;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes dripDown {
            0% { height: 0; opacity: 1; transform: translateY(0); }
            50% { height: 20px; opacity: 1; }
            100% { height: 0; opacity: 0; transform: translateY(40px); }
        }

        .skull-glitch .blood-drip {
            animation: dripDown 1.5s infinite;
            opacity: 1;
        }

        .skull-glitch .profile-img-cyber { opacity: 0; }
        .skull-glitch .profile-img-skull { opacity: 1; transform: scale(1.1); }
        .skull-glitch .profile-wrapper::after { border-color: #ff0000; }

        @keyframes spin { to { transform: rotate(360deg); } }

        h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 5px; color: #fff; text-shadow: 0 0 10px var(--primary); }
        .status { font-size: 11px; letter-spacing: 3px; margin-bottom: 20px; animation: warningPulse 2s infinite; }

        @keyframes warningPulse { 0%, 100% { color: var(--primary); } 50% { color: #ff0000; } }

        .links-grid { display: grid; gap: 10px; }

        .cyber-btn {
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border); border-radius: 15px;
            display: flex; align-items: center;
            text-decoration: none; color: #fff;
            transition: 0.3s;
        }

        .cyber-btn:hover { background: rgba(0, 242, 255, 0.05); border-color: var(--primary); transform: translateX(-5px); }
        .cyber-btn i { font-size: 20px; margin-left: 15px; color: var(--primary); }
        .cyber-btn span { font-size: 13px; flex-grow: 1; text-align: right; font-weight: 600; }

        .deco-line { width: 40px; height: 1px; background: var(--primary); margin: 15px auto; opacity: 0.3; }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="dataRain"></canvas>

    <div class="container" id="mainContainer">
        <div class="profile-wrapper">
            <div class="profile-img-cyber"></div>
            <div class="profile-img-skull"></div>
            <div class="blood-drip" style="left: 45%; animation-delay: 0s;"></div>
            <div class="blood-drip" style="left: 55%; animation-delay: 0.4s;"></div>
            <div class="blood-drip" style="left: 50%; animation-delay: 0.8s;"></div>
        </div>
        
        <h1 id="glitchName">ALI HUSSEIN</h1>
        <div class="status">DON'T PLAY WITH ME</div>

        <div class="links-grid">
            <a href="https://www.instagram.com/not_wawi/" class="cyber-btn" target="_blank">
                <i class="fab fa-instagram"></i><span>INSTAGRAM</span>
          
            </a>
            <a href="https://t.me/ali_alyagoob" class="cyber-btn" target="_blank">
                <i class="fab fa-telegram-plane"></i><span>TELEGRAM</span>
            </a>
            <a href="https://youtube.com/@Ali.Alyagoob" class="cyber-btn" target="_blank">
                <i class="fab fa-youtube"></i><span>YOUTUBE</span>
            </a>
        </div>

        <div class="deco-line"></div>
        <p style="font-size: 8px; opacity: 0.4;">ENCRYPTED BY GEMINI AI • 2026</p>
    </div>

    <script>
        // مصفوفة خلفية (Data Rain)
        const canvas = document.getElementById('dataRain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const columns = Math.floor(canvas.width / 20);
        const drops = Array(columns).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // تأثير السكرامبل للاسم
        const nameEl = document.getElementById("glitchName");
        const original = nameEl.innerText;
        function scramble() {
            let iter = 0;
            const inv = setInterval(() => {
                nameEl.innerText = original.split("").map((l, i) => i < iter ? original[i] : "X#$%"[Math.floor(Math.random()*4)]).join("");
                if(iter >= original.length) clearInterval(inv);
                iter += 1/3;
            }, 30);
        }
        window.onload = scramble;

        // تفعيل وضع الجمجمة والدماء
        const container = document.getElementById('mainContainer');
        setTimeout(() => {
            container.classList.add('skull-glitch');
            setTimeout(() => container.classList.remove('skull-glitch'), 2500);
        }, 3000);

        setInterval(() => {
            if(Math.random() > 0.7) {
                container.classList.add('skull-glitch');
                setTimeout(() => container.classList.remove('skull-glitch'), 2500);
            }
        }, 20000);
    </script>
</body>
</html>
