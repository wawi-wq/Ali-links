        :root {

            --glass: rgba(255, 255, 255, 0.03);

        body {

            perspective: 2000px; position: relative;
        }

        /* تأثير CRT */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%; z-index: 99; pointer-events: none; opacity: 0.6;
        }

        #dataRain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        .cursor-dot, .cursor-circle { pointer-events: none; position: fixed; border-radius: 50%; opacity: 0; z-index: 999; }
        .cursor-dot { width: 6px; height: 6px; background-color: #fff; }
        .cursor-circle { width: 35px; height: 35px; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary); transition: transform 0.1s ease-out; }

        .container {
            width: 92%; max-width: 380px; padding: 25px 20px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 35px;
            text-align: center; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            animation: emerge 1s ease-out; transform-style: preserve-3d; transition: transform 0.3s ease;
            margin: 20px 0;
        }

        @keyframes emerge { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .profile-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; }
        .profile-img-cyber { width: 100px; height: 100px; background: url('me.png') center/contain no-repeat; z-index: 2; filter: drop-shadow(0 0 10px var(--primary)); transition: opacity 0.4s; }
        .profile-img-skull { width: 85px; height: 85px; background: url('skull.png') center/contain no-repeat; position: absolute; z-index: 3; opacity: 0; filter: drop-shadow(0 0 15px #ff0000); transform: scale(0.5); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .profile-wrapper::after { content: ''; position: absolute; width: 115px; height: 115px; border-radius: 50%; border: 2px solid var(--primary); border-top-color: transparent; border-bottom-color: transparent; animation: spin 3s linear infinite; }

        .skull-glitch .profile-img-cyber { opacity: 0; }
        .skull-glitch .profile-img-skull { opacity: 1; transform: scale(1.1); }
        .skull-glitch .profile-wrapper::after { border-color: #ff0000; }
        @keyframes spin { to { transform: rotate(360deg); } }

        h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 5px; color: #fff; text-shadow: 0 0 10px var(--primary); }
        .status { font-size: 11px; letter-spacing: 3px; margin-bottom: 20px; animation: warningPulse 2s infinite; }
        @keyframes warningPulse { 0%, 100% { color: var(--primary); } 50% { color: #ff0000; } }

        .links-grid { display: grid; gap: 10px; }
        .cyber-btn { padding: 14px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 15px; display: flex; align-items: center; text-decoration: none; color: #fff; transition: 0.3s; }
        .cyber-btn:hover { background: rgba(0, 242, 255, 0.05); border-color: var(--primary); transform: translateX(-5px); }
        .cyber-btn i { font-size: 20px; margin-left: 15px; color: var(--primary); }
        .cyber-btn span { font-size: 13px; flex-grow: 1; text-align: right; font-weight: 600; }

        /* ستايل التيرمنال للتقييم */
        .feedback-terminal {
            margin-top: 25px; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            border-radius: 15px; overflow: hidden; text-align: right;
        }
        .terminal-header { background: rgba(0, 242, 255, 0.1); padding: 5px 10px; font-size: 9px; color: var(--primary); display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .terminal-body { padding: 12px; }
        #feedback-text { width: 100%; background: transparent; border: none; color: #fff; outline: none; resize: none; height: 50px; font-size: 11px; font-family: monospace; }
        .send-btn { width: 100%; background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px; font-size: 10px; cursor: none; margin-top: 8px; transition: 0.3s; border-radius: 8px; font-weight: bold; }
        .send-btn:hover { background: var(--primary); color: black; }

        .deco-line { width: 40px; height: 1px; background: var(--primary); margin: 15px auto; opacity: 0.3; }
    </style>
</head>

            ctx.fillStyle = 'rgba(2, 2, 5, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
